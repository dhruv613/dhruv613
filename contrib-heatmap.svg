from datetime import datetime, timedelta
import re

# Input and output files
INPUT_FILE = "github_contributions.svg"
OUTPUT_FILE = "github_contributions_today.svg"

# Read SVG
with open(INPUT_FILE, "r", encoding="utf-8") as f:
    svg = f.read()

# Find all dates in YYYY-MM-DD format
dates = re.findall(r"\d{4}-\d{2}-\d{2}", svg)

if not dates:
    print("No dates found!")
    exit()

# Calculate shift so last date becomes today
unique_dates = sorted(set(dates))
last_date = datetime.strptime(unique_dates[-1], "%Y-%m-%d")
today = datetime.today()

shift = (today - last_date).days

# Replace every date
date_map = {}
for d in unique_dates:
    old = datetime.strptime(d, "%Y-%m-%d")
    new = (old + timedelta(days=shift)).strftime("%Y-%m-%d")
    date_map[d] = new

for old, new in date_map.items():
    svg = svg.replace(old, new)

# Save new SVG
with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
    f.write(svg)

print(f"Done! Saved as {OUTPUT_FILE}")
